info:
  name: EndpointCONToken
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:8080/api/products/page?page=0&size=5
  headers:
    - name: Authorization
      value: Bearer {{token}}
  params:
    - name: page
      value: "0"
      type: query
    - name: size
      value: "5"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
