info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/api/auth/register
  body:
    type: json
    data: |-
      {
        "name": "Marco Cobos",
        "email": "marco@example.com",
        "password": "Secure123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
